<!DOCTYPE html>
<html lang="kr">
<head>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome to KakaoTalk</title>
</head>
<body>
    <div class="status-bar">
        <div class="status-bar__column">
            <span>12:00</span>
        </div>
        <div class="status-bar__column">
            <img src="icons/cellular.svg" alt="Cellular Icon">
            <img src="icons/wifi.svg" alt="WiFi Icon">
            <img src="icons/battery.svg" alt="Battery Icon">
        </div>
    </div>

    <header class="login-header">
        <img src="icons/logo.svg" alt="Kakao Logo" class="login-header__logo">
    </header>

    <form id="login-form" action="friends.html">
        <input type="text" placeholder="카카오계정(이메일 또는 전화번호)">
        <input type="password" placeholder="비밀번호">

        <input type="submit" value="로그인">
        <p class="divider">또는</p>
        <input type="submit" value="QR코드 로그인">
        
        <div class="login-options">
            <div class="login-options__column">
                <a href="#">회원가입</a>
            </div>
            <div class="login-options__column">
                <a href="#">카카오계정</a>
                <a href="#">비밀번호 찾기</a>
            </div>
        </div>
    </form>
</body>
</html>
