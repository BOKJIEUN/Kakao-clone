    <div id="splash-screen">

    <script>
    // 1. 브라우저 저장소에 'splash-played'라는 기록이 있는지 확인합니다.
    const splashPlayed = sessionStorage.getItem("splash-played");

    if (splashPlayed) {
        // 2. 이미 기록이 있다면 스플래시 화면을 아예 없애버립니다.
        const splashScreen = document.getElementById("splash-screen");
        if (splashScreen) {
            splashScreen.style.display = "none";
        }
    } else {
        // 3. 기록이 없다면 '첫 방문'이므로 기록을 남깁니다.
        sessionStorage.setItem("splash-played", "true");
    }
</script>
